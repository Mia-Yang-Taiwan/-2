// ── Helper: generate order id ─────────────────────────────────────────────────
function genOrderId(existingOrders) {
  const now = new Date();
  const month = now.getMonth() + 1;
  const label = `${month}月`;
  const sameMonth = existingOrders.filter(o => o.monthLabel === label);
  return sameMonth.length === 0 ? `${label}叫貨` : `${label}追加`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:480, margin:"0 auto", padding:"20px 20px 36px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <span style={{ fontWeight:700, fontSize:17, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, color:C.sub, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:"fixed", bottom:90, left:"50%", transform:"translateX(-50%)", background:C.text, color:"#fff", padding:"10px 22px", borderRadius:24, fontSize:14, fontWeight:600, zIndex:300, boxShadow:"0 4px 16px rgba(0,0,0,0.2)", whiteSpace:"nowrap" }}>{msg}</div>
  );
}

  const [tab,      setTab]      = useState("order");
  const [toast,    setToast]    = useState("");

  // manage sub-state
  const [manageView, setManageView] = useState("zones"); // zones | products
  const [activeZone, setActiveZone] = useState(null);
  const [dragId,     setDragId]     = useState(null);
  const [longPressId, setLongPressId] = useState(null);
  const longPressTimer = useRef(null);

  // modals
  const [showExport,   setShowExport]   = useState(false);
  const [showAdd,      setShowAdd]      = useState(false);
  const [editItem,     setEditItem]     = useState(null);
  const [deleteItem,   setDeleteItem]   = useState(null);
  const [showOrderDetail, setShowOrderDetail] = useState(null);
  const [showAddZone,  setShowAddZone]  = useState(false);
  const [deleteZone,   setDeleteZone]   = useState(null);
  const [editZone,     setEditZone]     = useState(null);

  // New modals for history order manipulation
  const [orderToDelete, setOrderToDelete] = useState(null);
  const [orderToEdit, setOrderToEdit] = useState(null);
  const [editingOrderItems, setEditingOrderItems] = useState([]);

  // forms
  const [form,     setForm]     = useState({ name:"", unit:"", note:"", zone:"A" });
  const [zoneForm, setZoneForm] = useState({ name:"" });

  useEffect(() => save(SK_PRODUCTS, products), [products]);
  useEffect(() => save(SK_ORDERS,   orders),   [orders]);
  useEffect(() => save(SK_ZONES,    zones),    [zones]);

  // ── Sorted products for ORDER tab (by zone order, then item order) ──────────
  const orderedProducts = useMemo(() => {
    const zoneOrder = zones.map(z => z.id);
    return [...products].sort((a, b) => {
      const za = zoneOrder.indexOf(a.zone);
      const zb = zoneOrder.indexOf(b.zone);
      if (za !== zb) return za - zb;
      return (a.order || 0) - (b.order || 0);
    });
  }, [products, zones]);

  const filteredProducts = useMemo(() =>
    orderedProducts.filter(p => p.name.includes(search)),
    [orderedProducts, search]
  );

  const selectedItems = useMemo(() =>
    orderedProducts.filter(p => qty[p.id] > 0).map(p => ({ ...p, qty: qty[p.id] })),
    [orderedProducts, qty]
  );

  const exportText = useMemo(() =>
    selectedItems.map(i => `${i.name} * ${i.qty}${i.unit}`).join("\n"),
    [selectedItems]
  );

  // Products in active zone for manage tab
  const zoneProducts = useMemo(() => {
    if (!activeZone) return [];
    return products
      .filter(p => p.zone === activeZone)
      .sort((a, b) => (a.order || 0) - (b.order || 0));
  }, [products, activeZone]);

  // ── Order submit ──────────────────────────────────────────────────────────────
  function handleSubmitOrder() {
    if (selectedItems.length === 0) { setToast("請先選擇品項數量"); return; }
    const now = new Date();
    const monthLabel = `${now.getMonth() + 1}月`;
    const id = genOrderId(orders);
    const order = {
      id,
      monthLabel,
      time: now.toLocaleString("zh-TW", { hour12: false }),
      items: selectedItems.map(i => ({ name: i.name, qty: i.qty, unit: i.unit })),
    };
    setOrders(prev => [order, ...prev]);
    setQty({});
    setShowExport(false);
    setToast("叫貨單已儲存！");
  }

  function handleCopyExport() {
    if (exportText) {
      navigator.clipboard.writeText(exportText).then(() => setToast("已複製到剪貼簿！")).catch(() => setToast("請手動複製"));
    }
  }

  // ── History Order Actions ────────────────────────────────────────────────────
  function handleOpenEditOrder(order) {
    setOrderToEdit(order);
    setEditingOrderItems(JSON.parse(JSON.stringify(order.items))); // 深度複製
  }

  function handleUpdateOrderItemQty(index, newQty) {
    setEditingOrderItems(prev => prev.map((item, i) => i === index ? { ...item, qty: newQty } : item));
  }

  function handleSaveEditOrder() {
    // 濾除數量大於 0 的品項
    const finalItems = editingOrderItems.filter(item => item.qty > 0);
    if (finalItems.length === 0) {
      setToast("品項數量不可全部為0，如不需此單請直接刪除");
      return;
    }
    setOrders(prev => prev.map(o => (o.id === orderToEdit.id && o.time === orderToEdit.time) ? { ...o, items: finalItems } : o));
    setOrderToEdit(null);
    setToast("訂單內容已更新！");
  }

  function handleDeleteOrder() {
    setOrders(prev => prev.filter(o => !(o.id === orderToDelete.id && o.time === orderToDelete.time)));
    // 如果目前打開的詳細資料剛好是被刪除的訂單，將其關閉
    if (showOrderDetail === (orderToDelete.id + orderToDelete.time)) {
      setShowOrderDetail(null);
    }
    setOrderToDelete(null);
    setToast("訂單已刪除");
  }

  // ── Product CRUD ──────────────────────────────────────────────────────────────
  function openAdd() {
    const defaultZone = activeZone || (zones[0]?.id || "A");
    setForm({ name:"", unit:"", note:"", zone: defaultZone });
    setShowAdd(true);
  }
  function openEdit(p) {
    setForm({ name: p.name, unit: p.unit, note: p.note, zone: p.zone || zones[0]?.id || "A" });
    setEditItem(p);
  }

  function saveAdd() {
    if (!form.name.trim()) { setToast("請輸入品名"); return; }
    const zoneProds = products.filter(p => p.zone === form.zone);
    const maxOrder = zoneProds.reduce((m, p) => Math.max(m, p.order || 0), 0);
    const newP = { id: Date.now(), name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone, order: maxOrder + 1 };
    setProducts(prev => [...prev, newP]);
    setShowAdd(false);
    Toast("品項已新增！");
  }

  function saveEdit() {
    if (!form.name.trim()) { setToast("請輸入品名"); return; }
    setProducts(prev => prev.map(p => p.id === editItem.id
      ? { ...p, name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone }
      : p
    ));
    setEditItem(null);
    setToast("已更新！");
  }

  function confirmDelete() {
    setProducts(prev => prev.filter(p => p.id !== deleteItem.id));
    setQty(prev => { const n = { ...prev }; delete n[deleteItem.id]; return n; });
    setDeleteItem(null);
    setToast("已刪除");
  }

  // ── Reorder within zone ───────────────────────────────────────────────────────
  function moveItem(id, dir) {
    const zProds = [...zoneProducts];
    const idx = zProds.findIndex(p => p.id === id);
    if (idx < 0) return;
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= zProds.length) return;
    const newOrder = zProds[idx].order;
    const swapOrder = zProds[swapIdx].order;
    setProducts(prev => prev.map(p => {
      if (p.id === zProds[idx].id) return { ...p, order: swapOrder };
      if (p.id === zProds[swapIdx].id) return { ...p, order: newOrder };
      return p;
    }));
  }

  // ── Drag reorder ──────────────────────────────────────────────────────────────
  function handleDragStart(id) { setDragId(id); }
  function handleDragOver(e, id) {
    e.preventDefault();
    if (dragId === null || dragId === id) return;
    const from = zoneProducts.findIndex(p => p.id === dragId);
    const to   = zoneProducts.findIndex(p => p.id === id);
    if (from < 0 || to < 0) return;
    const reordered = [...zoneProducts];
    const [moved] = reordered.splice(from, 1);
    reordered.splice(to, 0, moved);
    const updated = reordered.map((p, i) => ({ ...p, order: i + 1 }));
    setProducts(prev => prev.map(p => {
      const u = updated.find(u => u.id === p.id);
      return u ? u : p;
    }));
    setDragId(id);
  }
  function handleDragEnd() { setDragId(null); }

  // ── Long press (touch) ────────────────────────────────────────────────────────
  function handleTouchStart(id) {
    longPressTimer.current = setTimeout(() => {
      setLongPressId(id);
    }, 500);
  }
  function handleTouchEnd() {
    clearTimeout(longPressTimer.current);
  }

  // ── Zone CRUD ──────────────────────────────────────────────────────────────────
  function saveAddZone() {
    if (!zoneForm.name.trim()) { setToast("請輸入區域名稱"); return; }
    const id = Date.now().toString(36).toUpperCase().slice(-3);
    setZones(prev => [...prev, { id, name: zoneForm.name.trim() }]);
    setZoneForm({ name: "" });
    setShowAddZone(false);
    setToast("區域已新增！");
  }

  function confirmDeleteZone() {
    const zid = deleteZone.id;
    // move products in deleted zone to first remaining zone
    const remaining = zones.filter(z => z.id !== zid);
    const fallback = remaining[0]?.id || null;
    if (fallback) {
      setProducts(prev => prev.map(p => p.zone === zid ? { ...p, zone: fallback } : p));
    }
    setZones(remaining);
    setDeleteZone(null);
    setToast("區域已刪除");
    if (activeZone === zid) setActiveZone(null);
  }

  function saveEditZone() {
    if (!zoneForm.name.trim()) { setToast("請輸入區域名稱"); return; }
    setZones(prev => prev.map(z => z.id === editZone.id ? { ...z, name: zoneForm.name.trim() } : z));
    setEditZone(null);
    setToast("已更新！");
  }

  const tabBar = [
    { key:"order",    label:"叫貨",    icon:<IcoList /> },
    { key:"history", label:"紀錄",    icon:<IcoHistory /> },
    { key:"manage",  label:"管理品項", icon:<IcoSettings /> },
  ];

  return (
    <div style={{ fontFamily:"'Noto Sans TC','PingFang TC',system-ui,sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto" }}>

      {/* ── HEADER ── */}
      <div style={{ background:C.header, color:"#fff", padding:"14px 18px 12px", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 10px rgba(0,0,0,0.15)" }}>
        {tab === "manage" && manageView === "products" ? (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <button onClick={() => { setManageView("zones"); setActiveZone(null); setLongPressId(null); }} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.85)", cursor:"pointer", display:"flex", padding:0 }}><IcoBack /></button>
            <span style={{ fontWeight:800, fontSize:17 }}>{zones.find(z=>z.id===activeZone)?.name} 品項</span>
          </div>
        ) : (
          <div style={{ fontSize:18, fontWeight:800, letterSpacing:"0.04em" }}>🏥 錦禾中醫叫貨系統</div>
        )}
        {tab === "order" && (
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginTop:2 }}>
            已選 {selectedItems.length} 項 · 共 {selectedItems.reduce((s,i)=>s+i.qty,0)} 件
          </div>
        )}
      </div>

      {/* ══════════════ ORDER TAB ══════════════ */}
      {tab === "order" && (
        <div style={{ paddingBottom:110 }}>
          <div style={{ padding:"12px 16px 6px" }}>
            <div style={{ background:C.surface, borderRadius:12, display:"flex", alignItems:"center", padding:"9px 14px", gap:8, border:`1px solid ${C.border}` }}>
              <span style={{ color:C.sub }}><IcoSearch /></span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋品項…"
                style={{ border:"none", outline:"none", fontSize:15, flex:1, color:C.text, background:"transparent", fontFamily:"inherit" }} />
              {search && <button onClick={() => setSearch("")} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", fontSize:18, lineHeight:1 }}>✕</button>}
            </div>
          </div>

          <div style={{ padding:"4px 16px", display:"flex", flexDirection:"column", gap:8 }}>
            {filteredProducts.length === 0 && (
              <div style={{ textAlign:"center", color:C.sub, padding:"48px 0" }}>找不到符合品項</div>
            )}
            {(() => {
              let lastZone = null;
              let rowIdx = 0;
              return filteredProducts.map(p => {
                const showZoneLabel = p.zone !== lastZone;
                if (showZoneLabel) { lastZone = p.zone; rowIdx = 0; }
                const q = qty[p.id] || 0;
                const active = q > 0;
                const rowColor = active ? C.selected : (rowIdx % 2 === 0 ? C.rowA : C.rowB);
                rowIdx++;
                const zoneName = zones.find(z => z.id === p.zone)?.name || p.zone;
                return (
                  <React.Fragment key={p.id}>
                    {showZoneLabel && (
                      <div style={{ fontSize:12, fontWeight:700, color:C.sub, marginTop:4, marginBottom:0, paddingLeft:4, letterSpacing:"0.06em" }}>
                        ── {zoneName} ──
                      </div>
                    )}
                    <div style={{ background:rowColor, borderRadius:12, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, border:`1.5px solid ${active ? C.primary : C.border}`, transition:"all 0.15s" }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontWeight:600, fontSize:15, color:C.text }}>{p.name}</div>
                        {p.note && (
                          <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:3 }}>
                            <span style={{ color:C.accent }}><IcoInfo /></span>
                            <span style={{ fontSize:12, color:C.accent, fontWeight:500 }}>{p.note}</span>
                          </div>
                        )}
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                        <span style={{ fontSize:12, color:C.sub }}>{p.unit}</span>
                        <div style={{ position:"relative" }}>
                          <select value={q} onChange={e => setQty(prev => ({ ...prev, [p.id]: Number(e.target.value) }))}
                            style={{ appearance:"none", background: active ? C.primary : C.light, color: active ? "#fff" : C.text, border:"none", borderRadius:10, padding:"7px 28px 7px 14px", fontSize:15, fontWeight:700, cursor:"pointer", outline:"none", fontFamily:"inherit", minWidth:64 }}>
                            {QTY_OPTIONS.map(n => (
                              <option key={n} value={n} style={{ background:"#fff", color:C.text }}>{n === 0 ? "－" : n}</option>
                            ))}
                          </select>
                          <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color: active ? "rgba(255,255,255,0.7)" : C.sub, fontSize:10 }}>▼</span>
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              });
            })()}
          </div>

          {selectedItems.length > 0 && (
            <div style={{ position:"fixed", bottom:66, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, padding:"10px 16px", background:`linear-gradient(to top, ${C.bg} 60%, transparent)` }}>
              <button onClick={() => setShowExport(true)} style={{ ...btnPrimary, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <IcoExport /> 匯出叫貨單（{selectedItems.length} 項）
              </button>
            </div>
          )}
        </div>
      )}

      {/* ══════════════ HISTORY TAB ══════════════ */}
      {tab === "history" && (
        <div style={{ padding:"14px 16px 90px", display:"flex", flexDirection:"column", gap:10 }}>
          {orders.length === 0 && (
            <div style={{ textAlign:"center", color:C.sub, paddingTop:60 }}>還沒有叫貨紀錄</div>
          )}
          {orders.map(o => (
            <div key={o.id + o.time} style={{ background:C.rowA, borderRadius:14, overflow:"hidden", border:`1px solid ${C.border}` }}>
              <div onClick={() => setShowOrderDetail(showOrderDetail === (o.id+o.time) ? null : (o.id+o.time))}
                style={{ padding:"13px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{o.id}</div>
                  <div style={{ fontSize:12, color:C.sub, marginTop:2 }}>{o.time} · {o.items.length} 項</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:12 }} onClick={e => e.stopPropagation()}>
                  <button onClick={() => handleOpenEditOrder(o)} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", display:"flex", padding:4 }}>
                    <IcoEdit />
                  </button>
                  <button onClick={() => setOrderToDelete(o)} style={{ background:"none", border:"none", color:C.danger, cursor:"pointer", display:"flex", padding:4 }}>
                    <IcoTrash />
                  </button>
                  <div onClick={() => setShowOrderDetail(showOrderDetail === (o.id+o.time) ? null : (o.id+o.time))} style={{ display:"flex", alignItems:"center", gap:4, cursor:"pointer", paddingLeft:4 }}>
                    <span style={{ background:"#e8ddd0", color:C.primary, fontSize:12, fontWeight:600, padding:"3px 10px", borderRadius:20 }}>已送出</span>
                    <span style={{ color:C.sub, fontSize:12 }}>{showOrderDetail === (o.id+o.time) ? "▲" : "▼"}</span>
                  </div>
                </div>
              </div>
              {showOrderDetail === (o.id+o.time) && (
                <div style={{ borderTop:`1px solid ${C.border}`, padding:"10px 16px 14px" }}>
                  {o.items.map((item, i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", borderBottom: i < o.items.length-1 ? `1px dashed ${C.border}` : "none" }}>
                      <span style={{ fontSize:14, color:C.text }}>{item.name}</span>
                      <span style={{ fontSize:14, fontWeight:700, color:C.primary }}>{item.qty} {item.unit}</span>
                    </div>
                  ))}
                  <button onClick={() => {
                    const txt = o.items.map(i => `${i.name} * ${i.qty}${i.unit}`).join("\n");
                    navigator.clipboard.writeText(txt).then(() => setToast("已複製！")).catch(() => setToast("請手動複製"));
                  }} style={{ marginTop:10, background:C.light, border:"none", borderRadius:8, padding:"7px 14px", fontSize:13, color:C.sub, cursor:"pointer", display:"flex", alignItems:"center", gap:5, fontFamily:"inherit" }}>
                    <IcoCopy /> 複製此單
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* ══════════════ MANAGE TAB ══════════════ */}
      {tab === "manage" && (
        <div style={{ padding:"14px 16px 90px" }}>

          {/* Zone list view */}
          {manageView === "zones" && (
            <>
              <button onClick={() => setShowAddZone(true)}
                style={{ ...btnPrimary, background:C.addBtn, marginBottom:14, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"11px 0", borderRadius:10 }}>
                <IcoPlus /> 新增區域
              </button>

              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {zones.map(z => {
                  const count = products.filter(p => p.zone === z.id).length;
                  return (
                    <div key={z.id} onClick={() => { setActiveZone(z.id); setManageView("products"); }}
                      style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer" }}>
                      <div>
                        <span style={{ fontWeight:700, color:C.text, fontSize:15 }}>{z.name}</span>
                        <span style={{ fontSize:12, color:C.sub, marginLeft:8 }}>({count} 個品項)</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:12 }} onClick={e => e.stopPropagation()}>
                        <button onClick={() => { setZoneForm({ name:z.name }); setEditZone(z); }} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", display:"flex" }}><IcoEdit /></button>
                        <button onClick={() => setDeleteZone(z)} style={{ background:"none", border:"none", color:C.danger, cursor:"pointer", display:"flex" }}><IcoTrash /></button>
                        <span style={{ color:C.light, fontSize:16, fontWeight:700, paddingLeft:4 }}>›</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* Products list view inside a zone */}
          {manageView === "products" && activeZone && (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <button onClick={openAdd}
                style={{ ...btnPrimary, background:C.addBtn, marginBottom:6, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"11px 0", borderRadius:10 }}>
                <IcoPlus /> 新增品項
              </button>

              {zoneProducts.length === 0 && (
                <div style={{ textAlign:"center", color:C.sub, padding:"40px 0", fontSize:14 }}>此區域尚無品項</div>
              )}

              {zoneProducts.map((p, index) => {
                const isDragging = p.id === dragId;
                const isLongPressed = p.id === longPressId;
                return (
                  <div key={p.id}
                    draggable
                    onDragStart={() => handleDragStart(p.id)}
                    onDragOver={(e) => handleDragOver(e, p.id)}
                    onDragEnd={handleDragEnd}
                    onTouchStart={() => handleTouchStart(p.id)}
                    onTouchEnd={handleTouchEnd}
                    style={{
                      background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 14px",
                      display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                      opacity: isDragging ? 0.4 : 1, transition: "transform 0.1s",
                      position: "relative",
                    }}
                  >
                    {/* Reorder Buttons (Desktop/Click) */}
                    <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                      <button disabled={index === 0} onClick={() => moveItem(p.id, -1)} style={{ background:"none", border:"none", color: index===0?C.light:C.sub, cursor:index===0?"default":"pointer", padding:2, display:"flex" }}><IcoUp /></button>
                      <button disabled={index === zoneProducts.length - 1} onClick={() => moveItem(p.id, 1)} style={{ background:"none", border:"none", color: index===zoneProducts.length-1?C.light:C.sub, cursor:index===zoneProducts.length-1?"default":"pointer", padding:2, display:"flex" }}><IcoDown /></button>
                    </div>

                    <div style={{ flex: 1, minWidth: 0, paddingLeft: 4 }}>
                      <div style={{ fontWeight: 600, color: C.text, fontSize: 14, display:"flex", alignItems:"center", gap:6 }}>
                        {p.name}
                        <span style={{ fontSize:12, color:C.sub, fontWeight:400 }}>({p.unit})</span>
                      </div>
                      {p.note && <div style={{ fontSize: 11, color: C.accent, marginTop: 2 }}>{p.note}</div>}
                    </div>

                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <button onClick={() => openEdit(p)} style={{ background: "none", border: "none", color: C.sub, cursor: "pointer", display: "flex", padding:4 }}><IcoEdit /></button>
                      <button onClick={() => setDeleteItem(p)} style={{ background: "none", border: "none", color: C.danger, cursor: "pointer", display: "flex", padding:4 }}><IcoTrash /></button>
                      
                      {/* Drag Handle (Mobile long press indicator / Desktop drag indicator) */}
                      <div style={{ color: isLongPressed ? C.primary : C.light, cursor: "move", display: "flex", alignItems: "center" }}>
                        <IcoDrag />
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={{ fontSize:11, color:C.sub, textAlign:"center", marginTop:8 }}>
                * 電腦端可直接拖曳排序；手機端可使用上下箭頭調整順序。
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── BOTTOM NAVIGATION BAR ── */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, height:66, background:C.surface, borderTop:`1.5px solid ${C.border}`, display:"flex", zIndex:150 }}>
        {tabBar.map(t => {
          const active = tab === t.key;
          return (
            <button key={t.key} onClick={() => { setTab(t.key); setSearch(""); }}
              style={{ flex:1, background:"none", border:"none", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, color: active ? C.primary : C.sub, cursor:"pointer", fontFamily:"inherit" }}>
              <div style={{ transform: active ? "scale(1.1)" : "scale(1)", transition:"transform 0.1s" }}>{t.icon}</div>
              <span style={{ fontSize:11, fontWeight: active ? 700 : 500 }}>{t.label}</span>
            </button>
          );
        })}
      </div>

      {/* ── MODALS: ORDER EXPORT ── */}
      {showExport && (
        <Modal title="確認叫貨清單" onClose={() => setShowExport(false)}>
          <div style={{ background:"#fff", borderRadius:12, padding:14, border:`1px solid ${C.border}`, maxHeight:"35vh", overflowY:"auto", marginBottom:16 }}>
            {selectedItems.map((item, i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom: i<selectedItems.length-1?`1px dashed ${C.bg}`:"none", fontSize:14, color:C.text }}>
                <span>{item.name}</span>
                <span style={{ fontWeight:700, color:C.primary }}>{item.qty} {item.unit}</span>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={handleCopyExport} style={{ ...btnPrimary, background:C.surface, color:C.text, border:`1.5px solid ${C.border}`, flex:1, padding:"11px 0" }}>僅複製文字</button>
            <button onClick={handleSubmitOrder} style={{ ...btnPrimary, flex:1, padding:"11px 0" }}>儲存並複製</button>
          </div>
        </Modal>
      )}

      {/* ── MODALS: EDIT HISTORY ORDER ── */}
      {orderToEdit && (
        <Modal title={`修改訂單: ${orderToEdit.id}`} onClose={() => setOrderToEdit(null)}>
          <div style={{ background:"#fff", borderRadius:12, padding:14, border:`1px solid ${C.border}`, maxHeight:"45vh", overflowY:"auto", marginBottom:16, display:"flex", flexDirection:"column", gap:10 }}>
            {editingOrderItems.map((item, i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 0", borderBottom: i<editingOrderItems.length-1?`1px dashed ${C.bg}`:"none" }}>
                <span style={{ fontSize:14, color:C.text, flex:1, minWidth:0, marginRight:8 }}>{item.name}</span>
                <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                  <span style={{ fontSize:12, color:C.sub }}>{item.unit}</span>
                  <div style={{ position:"relative" }}>
                    <select value={item.qty} onChange={e => handleUpdateOrderItemQty(i, Number(e.target.value))}
                      style={{ appearance:"none", background: item.qty > 0 ? C.primary : C.light, color: item.qty > 0 ? "#fff" : C.text, border:"none", borderRadius:10, padding:"6px 24px 6px 12px", fontSize:14, fontWeight:700, cursor:"pointer", outline:"none", fontFamily:"inherit", minWidth:60 }}>
                      {QTY_OPTIONS.map(n => (
                        <option key={n} value={n} style={{ background:"#fff", color:C.text }}>{n === 0 ? "刪除" : n}</option>
                      ))}
                    </select>
                    <span style={{ position:"absolute", right:6, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color: item.qty > 0 ? "rgba(255,255,255,0.7)" : C.sub, fontSize:9 }}>▼</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => setOrderToEdit(null)} style={{ ...btnPrimary, background:C.surface, color:C.text, border:`1.5px solid ${C.border}`, flex:1, padding:"11px 0" }}>取消</button>
            <button onClick={handleSaveEditOrder} style={{ ...btnPrimary, flex:1, padding:"11px 0" }}>保存修改</button>
          </div>
        </Modal>
      )}

      {/* ── MODALS: DELETE HISTORY ORDER CONFIRMATION ── */}
      {orderToDelete && (
        <Modal title="刪除確認" onClose={() => setOrderToDelete(null)}>
          <div style={{ fontSize:15, color:C.text, marginBottom:20, textAlign:"center", fontWeight:500 }}>
            確定要刪除 <span style={{ color:C.danger, fontWeight:700 }}>{orderToDelete.id} ({orderToDelete.time})</span> 嗎？此操作無法還原。
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => setOrderToDelete(null)} style={{ ...btnPrimary, background:C.surface, color:C.text, border:`1.5px solid ${C.border}`, flex:1, padding:"11px 0" }}>取消</button>
            <button onClick={handleDeleteOrder} style={{ ...btnPrimary, background:C.danger, flex:1, padding:"11px 0" }}>確認刪除</button>
          </div>
        </Modal>
      )}

      {/* ── MODALS: PRODUCT ADD ── */}
      {showAdd && (
        <Modal title="新增品項" onClose={() => setShowAdd(false)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:18 }}>
            <div>
              <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>品項名稱 *</label>
              <input value={form.name} onChange={e=>setForm(prev=>({...prev, name:e.target.value}))} placeholder="例: 針4005" style={inputStyle} />
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>單位</label>
                <input value={form.unit} onChange={e=>setForm(prev=>({...prev, unit:e.target.value}))} placeholder="例: 盒 / 包" style={inputStyle} />
              </div>
              <div style={{ flex:1.5 }}>
                <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>存放區域</label>
                <div style={{ position:"relative" }}>
                  <select value={form.zone} onChange={e=>setForm(prev=>({...prev, zone:e.target.value}))}
                    style={{ ...inputStyle, appearance:"none", paddingRight:30 }}>
                    {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
                  </select>
                  <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:C.sub, fontSize:12 }}>▼</span>
                </div>
              </div>
            </div>
            <div>
              <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>備註說明</label>
              <input value={form.note} onChange={e=>setForm(prev=>({...prev, note:e.target.value}))} placeholder="例: 一箱6罐 / 規格說明" style={inputStyle} />
            </div>
          </div>
          <button onClick={saveAdd} style={btnPrimary}>確認新增</button>
        </Modal>
      )}

      {/* ── MODALS: PRODUCT EDIT ── */}
      {editItem && (
        <Modal title="修改品項資料" onClose={() => setEditItem(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:18 }}>
            <div>
              <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>品項名稱 *</label>
              <input value={form.name} onChange={e=>setForm(prev=>({...prev, name:e.target.value}))} style={inputStyle} />
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>單位</label>
                <input value={form.unit} onChange={e=>setForm(prev=>({...prev, unit:e.target.value}))} style={inputStyle} />
              </div>
              <div style={{ flex:1.5 }}>
                <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>存放區域</label>
                <div style={{ position:"relative" }}>
                  <select value={form.zone} onChange={e=>setForm(prev=>({...prev, zone:e.target.value}))} style={{ ...inputStyle, appearance:"none", paddingRight:30 }}>
                    {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
                  </select>
                  <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:C.sub, fontSize:12 }}>▼</span>
                </div>
              </div>
            </div>
            <div>
              <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>備註說明</label>
              <input value={form.note} onChange={e=>setForm(prev=>({...prev, note:e.target.value}))} style={inputStyle} />
            </div>
          </div>
          <button onClick={saveEdit} style={btnPrimary}>儲存修改</button>
        </Modal>
      )}

      {/* ── MODALS: PRODUCT DELETE ── */}
      {deleteItem && (
        <Modal title="刪除品項" onClose={() => setDeleteItem(null)}>
          <div style={{ fontSize:15, color:C.text, marginBottom:20, textAlign:"center" }}>
            確定要刪除 <span style={{ color:C.danger, fontWeight:700 }}>{deleteItem.name}</span> 嗎？
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => setDeleteItem(null)} style={{ ...btnPrimary, background:C.surface, color:C.text, border:`1.5px solid ${C.border}`, flex:1, padding:"11px 0" }}>取消</button>
            <button onClick={confirmDelete} style={{ ...btnPrimary, background:C.danger, flex:1, padding:"11px 0" }}>確認刪除</button>
          </div>
        </Modal>
      )}

      {/* ── MODALS: ZONE ADD ── */}
      {showAddZone && (
        <Modal title="新增區域" onClose={() => setShowAddZone(false)}>
          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>區域名稱 *</label>
            <input value={zoneForm.name} onChange={e => setZoneForm({ name: e.target.value })} placeholder="例: F 區 / 診間倉庫" style={inputStyle} />
          </div>
          <button onClick={saveAddZone} style={btnPrimary}>確認新增</button>
        </Modal>
      )}

      {/* ── MODALS: ZONE EDIT ── */}
      {editZone && (
        <Modal title="修改區域名稱" onClose={() => setEditZone(null)}>
          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:13, fontWeight:600, color:C.sub, display:"block", marginBottom:4 }}>區域名稱 *</label>
            <input value={zoneForm.name} onChange={e => setZoneForm({ name: e.target.value })} style={inputStyle} />
          </div>
          <button onClick={saveEditZone} style={btnPrimary}>儲存修改</button>
        </Modal>
      )}

      {/* ── MODALS: ZONE DELETE ── */}
      {deleteZone && (
        <Modal title="刪除區域" onClose={() => setDeleteZone(null)}>
          <div style={{ fontSize:14, color:C.text, marginBottom:20, textAlign:"left", lineHeight:1.5 }}>
            確定要刪除 <span style={{ color:C.danger, fontWeight:700 }}>{deleteZone.name}</span> 嗎？<br />
            <span style={{ color:C.accent, fontSize:12 }}>註：該區域內的品項將會自動變更歸類至第一個剩餘的區域。</span>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => setDeleteZone(null)} style={{ ...btnPrimary, background:C.surface, color:C.text, border:`1.5px solid ${C.border}`, flex:1, padding:"11px 0" }}>取消</button>
            <button onClick={confirmDeleteZone} style={{ ...btnPrimary, background:C.danger, flex:1, padding:"11px 0" }}>確認刪除</button>
          </div>
        </Modal>
      )}

      {/* ── TOAST NOTIFICATION ── */}
      {toast && <Toast msg={toast} onDone={() => setToast("")} />}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
