// 取得目前登入者的 access token（REST 直連需要帶這個才能符合 RLS）
async function getAuthHeader() {
  const { data } = await sb.auth.getSession();
  const token = data?.session?.access_token || SUPABASE_KEY;
  return { ...sbHeaders, "Authorization": `Bearer ${token}` };
}

// 從 Supabase 讀取一個 key 的 value
async function sbGet(key) {
  try {
    const headers = await getAuthHeader();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": headers.Authorization }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.length > 0 ? data[0].value : null;
  } catch { return null; }
}

// 寫入或更新一個 key
async function sbSet(key, value) {
  try {
    const headers = await getAuthHeader();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: "POST",
      headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
    return res.ok;
  } catch { return false; }
}

function localLoad(key, fb) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fb; } catch { return fb; }
}
function localSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function copyTextToClipboard(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.setAttribute("readonly", "");
  ta.style.position = "fixed";
  ta.style.top = "-1000px";
  ta.style.left = "-1000px";
  document.body.appendChild(ta);
  ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
  let ok = false;
  try { ok = document.execCommand("copy"); } catch { ok = false; }
  document.body.removeChild(ta);
  if (!ok && navigator.clipboard?.writeText) navigator.clipboard.writeText(text).catch(() => {});
  return ok;
}

function genOrderId(existingOrders) {
  const now = new Date();
  const month = now.getMonth() + 1;
  const label = `${month}月`;
  const sameMonth = existingOrders.filter(o => o.monthLabel === label);
  return sameMonth.length === 0 ? `${label}叫貨` : `${label}追加`;
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:480, margin:"0 auto", padding:"20px 20px 36px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <span style={{ fontWeight:700, fontSize:17, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, color:C.sub, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:"fixed", bottom:90, left:"50%", transform:"translateX(-50%)", background:C.text, color:"#fff", padding:"10px 22px", borderRadius:24, fontSize:14, fontWeight:600, zIndex:300, boxShadow:"0 4px 16px rgba(0,0,0,0.2)", whiteSpace:"nowrap" }}>{msg}</div>
  );
}

// ── Sync Status Badge ─────────────────────────────────────────────────────────
function SyncBadge({ status, onRefresh }) {
  // status: 'syncing' | 'synced' | 'error' | 'offline'
  const config = {
    syncing: { color: "#F5F5DC", label: "同步中…",   icon: <span className="spin"><IcoSync /></span> },
    synced:  { color: "#FFFFFF", label: "雲端已同步", icon: <IcoCloud /> },
    error:   { color: "#FFD9D2", label: "同步失敗",   icon: <IcoCloud /> },
    offline: { color: "#A9A9A9", label: "離線模式",   icon: <IcoCloud /> },
  };
  const c = config[status] || config.offline;
  return (
    <button onClick={onRefresh} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color: c.color, background:"none", border:"none", cursor:"pointer", padding:0, fontFamily:"inherit" }}>
      {c.icon} {c.label}
      <IcoRefresh />
    </button>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  async function handleLogin() {
    setErr(""); setMsg("");
    if (!email.trim() || !password) { setErr("請輸入帳號與密碼"); return; }
    setBusy(true);
    const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
    setBusy(false);
    if (error) { setErr(error.message === "Invalid login credentials" ? "帳號或密碼錯誤" : error.message); return; }
    onAuthed(data.session);
  }

  async function handleSignup() {
    setErr(""); setMsg("");
    if (!email.trim() || !password) { setErr("請輸入帳號與密碼"); return; }
    if (password.length < 6) { setErr("密碼至少需要 6 個字元"); return; }
    setBusy(true);
    const { data, error } = await sb.auth.signUp({ email: email.trim(), password });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // 新帳號的 profiles 紀錄由資料庫觸發器（handle_new_user）自動建立，預設角色為 member
    if (data.session) {
      onAuthed(data.session);
    } else {
      setMsg("註冊成功！請check您的 email 完成驗證後再登入。");
      setMode("login");
    }
  }

  async function handleReset() {
    setErr(""); setMsg("");
    if (!email.trim()) { setErr("請輸入您的 email"); return; }
    setBusy(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim());
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setMsg("重設密碼信件已寄出，請check您的 email。");
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:C.bg, padding:"24px" }}>
      <div style={{ fontSize:44, marginBottom:6 }}>🏥</div>
      <div style={{ fontWeight:800, fontSize:21, color:C.header, marginBottom:28 }}>錦禾倉庫叫貨</div>

      <div style={{ width:"100%", maxWidth:340, background:C.surface, borderRadius:16, padding:"24px 20px", border:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, color:C.sub, marginBottom:18 }}>
          <IcoLock />
        </div>
        <div style={{ textAlign:"center", fontWeight:700, fontSize:16, color:C.text, marginBottom:18 }}>
          {mode === "login" ? "登入" : mode === "signup" ? "註冊新帳號" : "重設密碼"}
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:C.sub, marginBottom:6 }}>Email</div>
            <input style={inputStyle} type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          {mode !== "reset" && (
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:C.sub, marginBottom:6 }}>密碼</div>
              <input style={inputStyle} type="password" placeholder="至少 6 個字元" value={password}
                onChange={e => setPassword(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") (mode === "login" ? handleLogin() : handleSignup()); }} />
            </div>
          )}

          {err && <div style={{ color:C.danger, fontSize:13, fontWeight:600 }}>{err}</div>}
          {msg && <div style={{ color:C.addBtn, fontSize:13, fontWeight:600 }}>{msg}</div>}

          {mode === "login" && (
            <button disabled={busy} onClick={handleLogin} style={{ ...btnPrimary, opacity: busy ? 0.6 : 1 }}>{busy ? "登入中…" : "登入"}</button>
          )}
          {mode === "signup" && (
            <button disabled={busy} onClick={handleSignup} style={{ ...btnPrimary, background:C.addBtn, opacity: busy ? 0.6 : 1 }}>{busy ? "註冊中…" : "註冊"}</button>
          )}
          {mode === "reset" && (
            <button disabled={busy} onClick={handleReset} style={{ ...btnPrimary, opacity: busy ? 0.6 : 1 }}>{busy ? "寄送中…" : "寄送重設密碼信"}</button>
          )}
        </div>

        <div style={{ display:"flex", justifyContent:"center", gap:14, marginTop:18, fontSize:13 }}>
          {mode !== "login" && <button onClick={() => { setMode("login"); setErr(""); setMsg(""); }} style={{ background:"none", border:"none", color:C.primary, cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>登入</button>}
          {mode !== "signup" && <button onClick={() => { setMode("signup"); setErr(""); setMsg(""); }} style={{ background:"none", border:"none", color:C.primary, cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>註冊帳號</button>}
          {mode !== "reset" && <button onClick={() => { setMode("reset"); setErr(""); setMsg(""); }} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", fontFamily:"inherit" }}>忘記密碼</button>}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ── MAIN APP ──────────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [myRole, setMyRole] = useState(null); // 'admin' | 'member' | null

  const [products, setProducts] = useState(() => localLoad(SK_PRODUCTS, DEFAULT_PRODUCTS));
  const [zones,    setZones]    = useState(() => localLoad(SK_ZONES,    DEFAULT_ZONES));
  const [orders,   setOrders]   = useState(() => localLoad(SK_ORDERS,   []));
  const [qty,      setQty]      = useState({});
  const [search,   setSearch]   = useState("");
  const [tab,      setTab]      = useState("order");
  const [toast,    setToast]    = useState("");

  // cloud sync status
  const [syncStatus, setSyncStatus] = useState("offline"); // syncing | synced | error | offline
  const [isLoading,  setIsLoading]  = useState(true);

  // manage sub-state
  const [manageView,  setManageView]  = useState("zones");
  const [activeZone,  setActiveZone]  = useState(null);
  const [longPressId, setLongPressId] = useState(null);
  const longPressTimer = useRef(null);

  // modals
  const [showExport,     setShowExport]     = useState(false);
  const [showAdd,        setShowAdd]        = useState(false);
  const [editItem,       setEditItem]       = useState(null);
  const [deleteItem,     setDeleteItem]     = useState(null);
  const [showOrderDetail,setShowOrderDetail]= useState(null);
  const [showAddZone,    setShowAddZone]    = useState(false);
  const [deleteZone,     setDeleteZone]     = useState(null);
  const [editZone,       setEditZone]       = useState(null);
  const [orderToDelete,  setOrderToDelete]  = useState(null);
  const [orderToEdit,    setOrderToEdit]    = useState(null);
  const [editingOrderItems, setEditingOrderItems] = useState([]);

  // forms
  const [form,     setForm]     = useState({ name:"", unit:"", note:"", zone:"A" });
  const [zoneForm, setZoneForm] = useState({ name:"" });

  const isAdmin = myRole === "admin";

  // ── 監聽登入狀態 ──────────────────────────────────────────────────────────
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setAuthChecked(true);
    });
    const { data: listener } = sb.auth.onAuthStateChange((_event, sess) => {
      setSession(sess);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // ── 登入後查詢自己的角色（讀取 profiles 表，註冊時已由資料庫觸發器自動建立）──
  useEffect(() => {
    if (!session) { setMyRole(null); return; }
    (async () => {
      const { data, error } = await sb.from("profiles").select("role").eq("id", session.user.id).maybeSingle();
      if (!error && data) {
        setMyRole(data.role || "member");
      } else {
        // 理論上註冊時觸發器就會自動建立，這裡只是保險措施
        setMyRole("member");
      }
    })();
  }, [session]);

  // ── 啟動 / 登入後 從 Supabase 載入資料 ──────────────────────────────────
  const loadFromCloud = useCallback(async (silent) => {
    if (!silent) setIsLoading(true);
    setSyncStatus("syncing");
    try {
      const [cloudProducts, cloudZones, cloudOrders] = await Promise.all([
        sbGet(SK_PRODUCTS),
        sbGet(SK_ZONES),
        sbGet(SK_ORDERS),
      ]);

      if (cloudProducts) { setProducts(cloudProducts); localSave(SK_PRODUCTS, cloudProducts); }
      if (cloudZones)    { setZones(cloudZones);       localSave(SK_ZONES,    cloudZones); }
      if (cloudOrders)   { setOrders(cloudOrders);     localSave(SK_ORDERS,   cloudOrders); }

      setSyncStatus("synced");
    } catch {
      setSyncStatus("error");
    } finally {
      if (!silent) setIsLoading(false);
    }
  }, []);

  useEffect(() => {
    if (session) loadFromCloud(false);
  }, [session, loadFromCloud]);

  // ── 切到「管理品項」或「叫貨」分頁時，靜默重新拉取一次雲端資料 ─────────
  // 這樣手機/電腦互相切換頁籤時，能看到對方剛新增/刪除的最新品項
  useEffect(() => {
    if (session && (tab === "manage" || tab === "order")) {
      loadFromCloud(true);
    }
  }, [tab, session, loadFromCloud]);

  // ── 每 30 秒背景自動同步一次（多人同時使用時降低看到舊資料的機率）──────
  useEffect(() => {
    if (!session) return;
    const t = setInterval(() => loadFromCloud(true), 30000);
    return () => clearInterval(t);
  }, [session, loadFromCloud]);

  // ── 資料變動時同步到 Supabase + localStorage ──────────────────────────────
  const syncTimeouts = useRef({});

  function debouncedSync(key, value) {
    localSave(key, value);
    clearTimeout(syncTimeouts.current[key]);
    setSyncStatus("syncing");
    syncTimeouts.current[key] = setTimeout(async () => {
      const ok = await sbSet(key, value);
      setSyncStatus(ok ? "synced" : "error");
    }, 500);
  }

  function updateProducts(updater) {
    setProducts(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      debouncedSync(SK_PRODUCTS, next);
      return next;
    });
  }
  function updateZones(updater) {
    setZones(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      debouncedSync(SK_ZONES, next);
      return next;
    });
  }
  function updateOrders(updater) {
    setOrders(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      debouncedSync(SK_ORDERS, next);
      return next;
    });
  }

  // ── Sorted products ───────────────────────────────────────────────────────
  const orderedProducts = useMemo(() => {
    const zoneOrder = zones.map(z => z.id);
    return [...products].sort((a, b) => {
      const za = zoneOrder.indexOf(a.zone);
      const zb = zoneOrder.indexOf(b.zone);
      if (za !== zb) return za - zb;
      return (a.order || 0) - (b.order || 0);
    });
  }, [products, zones]);

  const filteredProducts = useMemo(() =>
    orderedProducts.filter(p => p.name.includes(search)),
    [orderedProducts, search]
  );

  const selectedItems = useMemo(() =>
    orderedProducts.filter(p => qty[p.id] > 0).map(p => ({ ...p, qty: qty[p.id] })),
    [orderedProducts, qty]
  );

  const exportText = useMemo(() =>
    "內湖叫貨\n" + selectedItems.map(i => `${i.name} * ${i.qty}${i.unit}`).join("\n"),
    [selectedItems]
  );

  const zoneProducts = useMemo(() => {
    if (!activeZone) return [];
    return products
      .filter(p => p.zone === activeZone)
      .sort((a, b) => (a.order || 0) - (b.order || 0));
  }, [products, activeZone]);

  // ── Order submit ──────────────────────────────────────────────────────────
  function handleSubmitOrder() {
    if (selectedItems.length === 0) { setToast("請先選擇品項數量"); return; }
    const now = new Date();
    const monthLabel = `${now.getMonth() + 1}月`;
    const id = genOrderId(orders);
    const order = {
      id, monthLabel,
      time: now.toLocaleString("zh-TW", { hour12: false }),
      items: selectedItems.map(i => ({ name: i.name, qty: i.qty, unit: i.unit })),
    };
    updateOrders(prev => [order, ...prev]);
    setQty({});
    setShowExport(false);
    setToast("叫貨單已儲存並同步！");
  }

  function handleCopyExport() {
    if (exportText) { copyTextToClipboard(exportText); setToast("已複製到剪貼簿！"); }
  }

  // ── History Order Actions ─────────────────────────────────────────────────
  function handleOpenEditOrder(order) {
    setOrderToEdit(order);
    setEditingOrderItems(JSON.parse(JSON.stringify(order.items)));
  }

  function handleUpdateOrderItemQty(index, newQty) {
    setEditingOrderItems(prev => prev.map((item, i) => i === index ? { ...item, qty: newQty } : item));
  }

  function handleSaveEditOrder() {
    const finalItems = editingOrderItems.filter(item => item.qty > 0);
    if (finalItems.length === 0) { setToast("品項數量不可全部為0，如不需此單請直接刪除"); return; }
    updateOrders(prev => prev.map(o =>
      (o.id === orderToEdit.id && o.time === orderToEdit.time) ? { ...o, items: finalItems } : o
    ));
    setOrderToEdit(null);
    setToast("訂單內容已更新！");
  }

  function handleDeleteOrder() {
    if (!isAdmin) { setToast("僅管理員可刪除訂單"); setOrderToDelete(null); return; }
    updateOrders(prev => prev.filter(o => !(o.id === orderToDelete.id && o.time === orderToDelete.time)));
    if (showOrderDetail === (orderToDelete.id + orderToDelete.time)) setShowOrderDetail(null);
    setOrderToDelete(null);
    setToast("訂單已刪除！");
  }

  // ── Product CRUD ──────────────────────────────────────────────────────────
  function openAdd() {
    const defaultZone = activeZone || (zones[0]?.id || "A");
    setForm({ name:"", unit:"", note:"", zone: defaultZone });
    setShowAdd(true);
  }
  function openEdit(p) {
    setForm({ name: p.name, unit: p.unit, note: p.note, zone: p.zone || zones[0]?.id || "A" });
    setEditItem(p);
  }

  function saveAdd() {
    if (!form.name.trim()) { setToast("請輸入品名"); return; }
    const zoneProds = products.filter(p => p.zone === form.zone);
    const maxOrder = zoneProds.reduce((m, p) => Math.max(m, p.order || 0), 0);
    const newP = { id: Date.now(), name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone, order: maxOrder + 1 };
    updateProducts(prev => [...prev, newP]);
    setShowAdd(false);
    setToast("品項已新增並同步！");
  }

  function saveEdit() {
    if (!form.name.trim()) { setToast("請輸入品名"); return; }
    updateProducts(prev => prev.map(p => p.id === editItem.id
      ? { ...p, name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone }
      : p
    ));
    setEditItem(null);
    setToast("已更新並同步！");
  }

  function confirmDelete() {
    if (!isAdmin) { setToast("僅管理員可刪除品項"); setDeleteItem(null); return; }
    updateProducts(prev => prev.filter(p => p.id !== deleteItem.id));
    setQty(prev => { const n = { ...prev }; delete n[deleteItem.id]; return n; });
    setDeleteItem(null);
    setToast("已刪除！");
  }

  function moveItem(id, dir) {
    const zProds = [...zoneProducts];
    const idx = zProds.findIndex(p => p.id === id);
    if (idx < 0) return;
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= zProds.length) return;
    const newOrder = zProds[idx].order;
    const swapOrder = zProds[swapIdx].order;
    updateProducts(prev => prev.map(p => {
      if (p.id === zProds[idx].id)   return { ...p, order: swapOrder };
      if (p.id === zProds[swapIdx].id) return { ...p, order: newOrder };
      return p;
    }));
  }

  function handleTouchStart(id) {
    longPressTimer.current = setTimeout(() => setLongPressId(id), 500);
  }
  function handleTouchEnd() { clearTimeout(longPressTimer.current); }

  // ── Zone CRUD ──────────────────────────────────────────────────────────────
  function saveAddZone() {
    if (!zoneForm.name.trim()) { setToast("請輸入區域名稱"); return; }
    const id = Date.now().toString(36).toUpperCase().slice(-3);
    updateZones(prev => [...prev, { id, name: zoneForm.name.trim() }]);
    setZoneForm({ name: "" });
    setShowAddZone(false);
    setToast("區域已新增！");
  }

  function confirmDeleteZone() {
    if (!isAdmin) { setToast("僅管理員可刪除區域"); setDeleteZone(null); return; }
    const zid = deleteZone.id;
    const remaining = zones.filter(z => z.id !== zid);
    const fallback = remaining[0]?.id || null;
    if (fallback) updateProducts(prev => prev.map(p => p.zone === zid ? { ...p, zone: fallback } : p));
    updateZones(remaining);
    setDeleteZone(null);
    setToast("區域已刪除！");
    if (activeZone === zid) setActiveZone(null);
  }

  function saveEditZone() {
    if (!zoneForm.name.trim()) { setToast("請輸入區域名稱"); return; }
    updateZones(prev => prev.map(z => z.id === editZone.id ? { ...z, name: zoneForm.name.trim() } : z));
    setEditZone(null);
    setToast("已更新！");
  }

  async function handleLogout() {
    await sb.auth.signOut();
    setSession(null);
    setMyRole(null);
    setTab("order");
  }

  const tabBar = [
    { key:"order",   label:"叫貨",   icon:<IcoList /> },
    { key:"history", label:"紀錄",   icon:<IcoHistory /> },
    { key:"manage",  label:"管理品項", icon:<IcoSettings /> },
  ];

  // ── 尚未確認登入狀態：顯示空白避免畫面閃爍 ──────────────────────────────
  if (!authChecked) {
    return <div style={{ minHeight:"100vh", background:C.bg }} />;
  }

  // ── 未登入：顯示登入畫面 ─────────────────────────────────────────────────
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }

  // ── Loading screen ────────────────────────────────────────────────────────
  if (isLoading || myRole === null) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:C.bg, gap:16 }}>
        <div style={{ fontSize:40 }}>🏥</div>
        <div style={{ fontWeight:800, fontSize:20, color:C.header }}>錦禾倉庫叫貨</div>
        <div style={{ display:"flex", alignItems:"center", gap:8, color:C.sub, fontSize:14 }}>
          <span className="spin"><IcoSync /></span> 從雲端載入資料中…
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily:"'Noto Sans TC','PingFang TC',system-ui,sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto" }}>

      {/* ── HEADER ── */}
      <div style={{ background:C.header, color:"#fff", padding:"14px 18px 12px", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 10px rgba(0,0,0,0.15)" }}>
        {tab === "manage" && manageView === "products" ? (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <button onClick={() => { setManageView("zones"); setActiveZone(null); setLongPressId(null); }} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.85)", cursor:"pointer", display:"flex", padding:0 }}><IcoBack /></button>
            <span style={{ fontWeight:800, fontSize:17 }}>{zones.find(z=>z.id===activeZone)?.name} 品項</span>
          </div>
        ) : (
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontSize:18, fontWeight:800, letterSpacing:"0.04em" }}>🏥 錦禾倉庫叫貨</div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3 }}>
              <SyncBadge status={syncStatus} onRefresh={() => loadFromCloud(true)} />
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:10, color:"rgba(255,255,255,0.75)", display:"flex", alignItems:"center", gap:3 }}>
                  <IcoUser /> {isAdmin ? "管理員" : "成員"}
                </span>
                <button onClick={handleLogout} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.75)", cursor:"pointer", display:"flex", alignItems:"center", gap:3, fontSize:10, padding:0, fontFamily:"inherit" }}>
                  <IcoLogout /> 登出
                </button>
              </div>
            </div>
          </div>
        )}
        {tab === "order" && (
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginTop:2 }}>
            已選 {selectedItems.length} 項 · 共 {selectedItems.reduce((s,i)=>s+i.qty,0)} 件
          </div>
        )}
      </div>

      {/* ══════════════ ORDER TAB ══════════════ */}

            <IcoCheck /> 儲存修改
          </button>
          <button onClick={() => setOrderToEdit(null)} style={{ width:"100%", marginTop:8, background:"none", border:"none", color:C.sub, fontSize:14, cursor:"pointer", padding:"8px", fontFamily:"inherit" }}>
            取消
          </button>
        </Modal>
      )}

      {/* ── DELETE ORDER MODAL ── */}
      {orderToDelete && (
        <Modal title="刪除訂單" onClose={() => setOrderToDelete(null)}>
          <div style={{ textAlign:"center", padding:"8px 0 16px" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🗑️</div>
            <div style={{ fontSize:16, color:C.text, marginBottom:6 }}>確定要刪除訂單</div>
            <div style={{ fontSize:18, fontWeight:700, color:C.danger, marginBottom:20 }}>「{orderToDelete.id}」？</div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setOrderToDelete(null)} style={{ flex:1, background:C.light, border:"none", borderRadius:10, padding:"13px", fontSize:15, cursor:"pointer", fontFamily:"inherit", color:C.text, fontWeight:600 }}>取消</button>
              <button onClick={handleDeleteOrder} style={{ flex:1, background:C.danger, border:"none", borderRadius:10, padding:"13px", fontSize:15, cursor:"pointer", fontFamily:"inherit", color:"#fff", fontWeight:700 }}>刪除</button>
            </div>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onDone={() => setToast("")} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
